<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Estoque e Contratos - Rede Benedetti</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="assets/style.css">
<style>
  .container { max-width: 760px; }
  .secao { margin-top: 34px; }
  .secao > label { margin-top: 0; }

  .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
  @media (max-width: 560px) { .grid-form { grid-template-columns: 1fr; } }

  .lista-item {
    font-size: 13.5px; color: var(--text-dim);
    padding: 12px 2px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .lista-item:last-child { border-bottom: none; }
  .lista-item .nome { color: var(--text); font-weight: 600; }
  .lista-item .det { font-size: 12.5px; color: var(--muted); }
  .btn-mini {
    width: auto; margin: 0; padding: 5px 10px; font-size: 11.5px;
    background: var(--bg-input); border: 1px solid var(--border-strong); color: var(--text-dim);
  }
  .btn-mini:hover { color: var(--red); border-color: var(--red); filter: none; }

  /* barra de saldo do contrato */
  .contrato-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px;
  }
  .contrato-card .topo { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .contrato-card h3 { margin: 0; font-size: 15px; }
  .contrato-card .comb { font-size: 12px; color: var(--text-dim); }
  .saldo-track { height: 9px; border-radius: 999px; background: var(--bg-input); border: 1px solid var(--border); overflow: hidden; margin: 10px 0 6px; }
  .saldo-fill { display: block; height: 100%; border-radius: 999px; background: var(--primary); }
  .saldo-fill.baixo { background: var(--red); }
  .saldo-nums { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }
  .saldo-nums b { color: var(--text); }

  /* relatorio */
  .filtros { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
  .filtros > div { flex: 1; min-width: 130px; }
  .filtros button { width: auto; margin-top: 0; padding: 12px 18px; }
  .tabela-wrap { overflow-x: auto; margin-top: 14px; border: 1px solid var(--border); border-radius: 12px; }
  table.rel { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 640px; }
  table.rel th {
    text-align: left; padding: 9px 12px; font-size: 10.5px; text-transform: uppercase;
    letter-spacing: .07em; color: var(--muted); border-bottom: 1px solid var(--border);
    background: var(--bg-card); white-space: nowrap;
  }
  table.rel td { padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; color: var(--text-dim); }
  table.rel td.num { font-family: var(--font-mono); color: var(--text); text-align: right; }
  table.rel th.num { text-align: right; }
  table.rel tr:last-child td { border-bottom: none; }

  .totais { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .total-chip {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 14px; font-size: 12.5px; color: var(--text-dim);
  }
  .total-chip b { color: var(--text); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="logo-row">
      <img src="icons/icon.svg" alt="">
      <h1>Estoque e Contratos</h1>
    </div>
    <a class="btn secondary tag-btn" href="index.html" style="width:auto">Voltar</a>
  </div>

  <div class="container">

    <!-- ============ CONTRATOS (ENTRADA) ============ -->
    <div class="secao">
      <label>Lançar entrada (contrato com usina)</label>
      <form id="form-contrato">
        <div class="grid-form">
          <div>
            <label for="ct-usina">Usina</label>
            <select id="ct-usina" required><option value="">Carregando...</option></select>
          </div>
          <div>
            <label for="ct-comb">Combustível</label>
            <select id="ct-comb" required>
              <option value="">Selecione</option>
              <option>Etanol</option>
              <option>Gasolina</option>
              <option>Gasolina Aditivada</option>
              <option>Diesel S10</option>
            </select>
          </div>
          <div>
            <label for="ct-volume">Volume contratado (litros)</label>
            <input id="ct-volume" type="number" min="1" step="0.01" required>
          </div>
          <div>
            <label for="ct-numero">Nº do contrato (opcional)</label>
            <input id="ct-numero" type="text">
          </div>
        </div>
        <button type="submit">Lançar entrada</button>
        <div class="msg"></div>
      </form>
    </div>

    <!-- ============ SALDOS ============ -->
    <div class="secao">
      <label>Contratos em aberto (saldo disponível)</label>
      <div id="lista-contratos"><div class="empty-state">Carregando...</div></div>
      <div class="msg" id="msg-contratos"></div>
    </div>

    <!-- ============ RELATÓRIO ============ -->
    <div class="secao">
      <label>Relatório de saídas por período</label>
      <div class="filtros">
        <div>
          <label for="rel-inicio">De</label>
          <input id="rel-inicio" type="date">
        </div>
        <div>
          <label for="rel-fim">Até</label>
          <input id="rel-fim" type="date">
        </div>
        <button type="button" id="btn-relatorio">Gerar</button>
        <button type="button" id="btn-csv" class="secondary" style="display:none">Baixar CSV</button>
      </div>
      <div id="rel-resultado"></div>
    </div>

    <!-- ============ USINAS ============ -->
    <div class="secao">
      <label>Usinas cadastradas</label>
      <form id="form-usina">
        <div class="grid-form">
          <div>
            <label for="us-nome">Nome da usina</label>
            <input id="us-nome" type="text" required>
          </div>
          <div>
            <label for="us-cidade">Cidade (opcional)</label>
            <input id="us-cidade" type="text">
          </div>
        </div>
        <button type="submit" class="secondary">Cadastrar usina</button>
        <div class="msg"></div>
      </form>
      <div id="lista-usinas" style="margin-top:10px"></div>
    </div>

  </div>

  <script src="assets/config.js"></script>
  <script src="assets/app-common.js"></script>
  <script>
    function esc(t) {
      const d = document.createElement("div");
      d.textContent = t == null ? "" : String(t);
      return d.innerHTML;
    }
    function fmtL(n) { return Number(n || 0).toLocaleString("pt-BR", { maximumFractionDigits: 0 }); }
    function mostrarMsg(el, texto, ok) {
      el.innerHTML = `<div class="${ok ? "success-msg" : "error-msg"}">${esc(texto)}</div>`;
      setTimeout(() => { el.innerHTML = ""; }, 6000);
    }

    // ---------- USINAS ----------
    async function carregarUsinas() {
      try {
        const resp = await callFunction("estoque", { tipo: "listar_usinas" });
        const lista = resp.usinas || [];
        document.getElementById("lista-usinas").innerHTML = lista.length
          ? lista.map((u) => `
              <div class="lista-item">
                <div>
                  <div class="nome">${esc(u.nome)}</div>
                  ${u.cidade ? `<div class="det">${esc(u.cidade)}</div>` : ""}
                </div>
                <button type="button" class="btn-mini" onclick="excluirUsina('${u.id}')">Excluir</button>
              </div>`).join("")
          : '<div class="lista-item">Nenhuma usina cadastrada ainda.</div>';

        const sel = document.getElementById("ct-usina");
        sel.innerHTML = '<option value="">Selecione a usina</option>' +
          lista.map((u) => `<option value="${u.id}">${esc(u.nome)}</option>`).join("");
      } catch (err) {
        document.getElementById("lista-usinas").innerHTML = `<div class="error-msg">${esc(err.message)}</div>`;
      }
    }

    async function excluirUsina(id) {
      if (!confirm("Excluir esta usina?")) return;
      try {
        await callFunction("estoque", { tipo: "excluir_usina", id });
        carregarUsinas();
      } catch (err) {
        alert(err.message);
      }
    }
    window.excluirUsina = excluirUsina;

    document.getElementById("form-usina").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msgEl = e.target.querySelector(".msg");
      try {
        await callFunction("estoque", {
          tipo: "cadastrar_usina",
          nome: document.getElementById("us-nome").value.trim(),
          cidade: document.getElementById("us-cidade").value.trim() || null
        });
        mostrarMsg(msgEl, "Usina cadastrada!", true);
        e.target.reset();
        carregarUsinas();
      } catch (err) {
        mostrarMsg(msgEl, err.message, false);
      }
    });

    // ---------- CONTRATOS ----------
    async function carregarContratos() {
      const el = document.getElementById("lista-contratos");
      try {
        const resp = await callFunction("estoque", { tipo: "listar_contratos" });
        const lista = resp.contratos || [];
        if (!lista.length) {
          el.innerHTML = '<div class="empty-state">Nenhum contrato em aberto. Lance uma entrada acima.</div>';
          return;
        }
        el.innerHTML = lista.map((c) => {
          const pct = c.volume_contratado > 0 ? Math.max(0, Math.min(100, (c.saldo / c.volume_contratado) * 100)) : 0;
          const baixo = pct < 15;
          return `
            <div class="contrato-card">
              <div class="topo">
                <div>
                  <h3>${esc(c.usina_nome)}</h3>
                  <div class="comb">${esc(c.combustivel)}${c.numero_contrato ? " · contrato " + esc(c.numero_contrato) : ""}</div>
                </div>
                <button type="button" class="btn-mini" onclick="encerrarContrato('${c.id}')">Encerrar</button>
              </div>
              <div class="saldo-track"><span class="saldo-fill${baixo ? " baixo" : ""}" style="width:${pct}%"></span></div>
              <div class="saldo-nums">
                <span>retirado <b>${fmtL(c.retirado)} L</b></span>
                <span>saldo <b>${fmtL(c.saldo)} L</b> de ${fmtL(c.volume_contratado)} L</span>
              </div>
            </div>`;
        }).join("");
      } catch (err) {
        el.innerHTML = `<div class="error-msg">${esc(err.message)}</div>`;
      }
    }

    async function encerrarContrato(id) {
      if (!confirm("Encerrar este contrato? O saldo restante deixa de ficar disponível pra novas cargas (o histórico é mantido).")) return;
      try {
        await callFunction("estoque", { tipo: "encerrar_contrato", id });
        carregarContratos();
      } catch (err) {
        alert(err.message);
      }
    }
    window.encerrarContrato = encerrarContrato;

    document.getElementById("form-contrato").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msgEl = e.target.querySelector(".msg");
      try {
        await callFunction("estoque", {
          tipo: "cadastrar_contrato",
          usina_id: document.getElementById("ct-usina").value,
          combustivel: document.getElementById("ct-comb").value,
          volume_contratado: Number(document.getElementById("ct-volume").value),
          numero_contrato: document.getElementById("ct-numero").value.trim() || null
        });
        mostrarMsg(msgEl, "Entrada lançada com sucesso!", true);
        document.getElementById("ct-volume").value = "";
        document.getElementById("ct-numero").value = "";
        carregarContratos();
      } catch (err) {
        mostrarMsg(msgEl, err.message, false);
      }
    });

    // ---------- RELATÓRIO ----------
    let ultimasSaidas = [];

    function dataISO(d) { return d.toISOString().slice(0, 10); }

    // padrão: últimos 7 dias
    (function initPeriodo() {
      const hoje = new Date();
      const seteAtras = new Date();
      seteAtras.setDate(hoje.getDate() - 6);
      document.getElementById("rel-fim").value = dataISO(hoje);
      document.getElementById("rel-inicio").value = dataISO(seteAtras);
    })();

    async function gerarRelatorio() {
      const el = document.getElementById("rel-resultado");
      const inicio = document.getElementById("rel-inicio").value;
      const fim = document.getElementById("rel-fim").value;
      if (!inicio || !fim) { el.innerHTML = '<div class="error-msg">Escolha o período.</div>'; return; }
      el.innerHTML = '<div class="empty-state">Gerando...</div>';
      try {
        const resp = await callFunction("estoque", { tipo: "relatorio", inicio, fim });
        const saidas = resp.saidas || [];
        ultimasSaidas = saidas;
        document.getElementById("btn-csv").style.display = saidas.length ? "inline-flex" : "none";

        if (!saidas.length) {
          el.innerHTML = '<div class="empty-state">Nenhuma saída no período.</div>';
          return;
        }

        const chips = [
          ...(resp.por_combustivel || []).map((t) => `<div class="total-chip">${esc(t.combustivel)}: <b>${fmtL(t.volume)} L</b></div>`),
          ...(resp.por_usina || []).map((t) => `<div class="total-chip">${esc(t.usina)}: <b>${fmtL(t.volume)} L</b></div>`)
        ].join("");

        const linhas = saidas.map((s) => `
          <tr>
            <td>${new Date(s.data).toLocaleDateString("pt-BR")}</td>
            <td>${esc(s.usina || "—")}</td>
            <td>${esc(s.combustivel)}</td>
            <td class="num">${fmtL(s.volume)}</td>
            <td>${esc(s.posto)}</td>
            <td>${esc(s.motorista)}</td>
            <td>${esc(statusLabel(s.status))}</td>
          </tr>`).join("");

        el.innerHTML = `
          <div class="totais">${chips}</div>
          <div class="tabela-wrap">
            <table class="rel">
              <thead><tr>
                <th>Data</th><th>Usina</th><th>Combustível</th><th class="num">Volume (L)</th>
                <th>Posto destino</th><th>Motorista</th><th>Status</th>
              </tr></thead>
              <tbody>${linhas}</tbody>
            </table>
          </div>`;
      } catch (err) {
        el.innerHTML = `<div class="error-msg">${esc(err.message)}</div>`;
      }
    }
    document.getElementById("btn-relatorio").addEventListener("click", gerarRelatorio);

    document.getElementById("btn-csv").addEventListener("click", () => {
      const cab = ["Data", "Usina", "Contrato", "Combustivel", "Volume (L)", "Posto destino", "Motorista", "Status", "Nota fiscal"];
      const linhas = ultimasSaidas.map((s) => [
        new Date(s.data).toLocaleDateString("pt-BR"),
        s.usina || "",
        s.numero_contrato || "",
        s.combustivel,
        String(s.volume).replace(".", ","),
        s.posto,
        s.motorista,
        statusLabel(s.status),
        s.nota_fiscal || ""
      ]);
      const csv = [cab, ...linhas]
        .map((l) => l.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(";"))
        .join("\r\n");
      const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `saidas_${document.getElementById("rel-inicio").value}_a_${document.getElementById("rel-fim").value}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    carregarUsinas();
    carregarContratos();
    gerarRelatorio();
  </script>
</body>
</html>
