<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Minhas cargas - Rede Benedetti</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0f172a">
<link rel="stylesheet" href="assets/style.css">
<style>
  /* Destaque do local de carregamento - o mais importante enquanto a carga
     está aguardando: é PRA ONDE o motorista tem que ir buscar o combustível */
  .destaque-local {
    background: var(--primary-soft);
    border: 1px solid color-mix(in srgb, var(--primary) 45%, transparent);
    border-radius: 12px;
    padding: 14px 15px;
    margin: 12px 0 4px;
  }
  .destaque-titulo {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--primary);
  }
  .destaque-endereco {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-top: 5px;
    text-wrap: balance;
  }
  .btn-mapa {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    background: var(--primary);
    color: var(--primary-ink);
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
  }
  .btn-mapa::before { content: "📍"; }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="logo-row">
      <img src="icons/icon.svg" alt="">
      <div>
        <h1>Minhas cargas</h1>
        <div class="sub" id="nome-motorista"></div>
      </div>
    </div>
    <button class="secondary tag-btn" onclick="logout()">Sair</button>
  </div>

  <div class="container">
    <button id="btn-notif" class="secondary" style="display:none">Ativar avisos de carga nova</button>
    <div id="lista">
      <div class="empty-state">Carregando...</div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/app-common.js"></script>
  <script>
    const sessao = requireSession("motorista");

    if (sessao) {
      document.getElementById("nome-motorista").textContent = sessao.nome;

      if ("Notification" in window && Notification.permission === "default") {
        const btnNotif = document.getElementById("btn-notif");
        btnNotif.style.display = "block";
        btnNotif.onclick = () => {
          Notification.requestPermission().then(() => {
            btnNotif.style.display = "none";
          });
        };
      }

      const INTERVALO_HEARTBEAT_MS = 5 * 60 * 1000; // 5 minutos
      const tracking = { cargaId: null, watchId: null, heartbeatId: null, ultimoEnvio: 0 };
      let idsConhecidos = null; // null = ainda não carregou nada (evita avisar na primeira vez)

      async function carregarCargas() {
        const listaEl = document.getElementById("lista");
        try {
          const resp = await callFunction("minhas-cargas", {
            acao: "listar_motorista",
            motorista_id: sessao.id
          });
          avisarCargasNovas(resp.cargas || []);
          renderizar(resp.cargas || []);
        } catch (err) {
          listaEl.innerHTML = `<div class="error-msg">${err.message}</div>`;
        }
      }

      function avisarCargasNovas(cargas) {
        const idsAtuais = new Set(cargas.map((c) => c.id));
        if (idsConhecidos) {
          const novas = cargas.filter((c) => !idsConhecidos.has(c.id));
          if (novas.length > 0) {
            tocarAlerta();
            notificar("Carga nova pra você!", `${novas[0].posto_nome} - ${novas[0].combustivel}`);
          }
        }
        idsConhecidos = idsAtuais;
      }

      function renderizar(cargas) {
        const listaEl = document.getElementById("lista");

        if (cargas.length === 0) {
          listaEl.innerHTML = '<div class="empty-state">Nenhuma carga no momento.</div>';
          pararRastreio();
          return;
        }

        listaEl.innerHTML = cargas.map((c) => {
          const aguardando = c.status === "aguardando_carregamento";
          const localMapa = c.local_carregamento
            ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.local_carregamento)}`
            : null;
          return `
          <div class="card">
            <span class="badge ${statusClass(c.status)}">${statusLabel(c.status)}</span>
            ${aguardando && c.local_carregamento ? `
              <div class="destaque-local">
                <div class="destaque-titulo">1º · CARREGAR EM</div>
                <div class="destaque-endereco">${c.local_carregamento}</div>
                ${localMapa ? `<a class="btn-mapa" href="${localMapa}" target="_blank" rel="noopener">Abrir rota no mapa</a>` : ""}
              </div>` : ""}
            <h3>${aguardando ? "Destino: " : ""}${c.posto_nome}</h3>
            <div class="row"><span>Combustível</span><span>${c.combustivel}</span></div>
            <div class="row"><span>Volume</span><span>${c.volume_total} L</span></div>
            ${c.numero_nota_fiscal ? `<div class="row"><span>Nota fiscal</span><span>${c.numero_nota_fiscal}</span></div>` : ""}
            ${!aguardando && c.local_carregamento ? `<div class="row"><span>Carregou em</span><span>${c.local_carregamento}</span></div>` : ""}
            ${c.status === "em_transito" && c.distancia_restante_km != null
              ? `<div class="row"><span>Distância restante</span><span>${Number(c.distancia_restante_km).toFixed(1)} km</span></div>
                 <div class="row"><span>ETA</span><span>${c.tempo_estimado_min ?? "-"} min</span></div>`
              : ""}
            <div id="acao-${c.id}"></div>
          </div>`;
        }).join("");

        cargas.forEach((c) => {
          const acaoEl = document.getElementById(`acao-${c.id}`);
          if (c.status === "aguardando_carregamento") {
            const btn = document.createElement("button");
            btn.textContent = "Carreguei, iniciar viagem";
            btn.onclick = () => iniciarViagem(c);
            acaoEl.appendChild(btn);
          } else if (c.status === "em_transito") {
            const btn = document.createElement("button");
            btn.className = "danger";
            btn.textContent = "Entreguei";
            btn.onclick = () => confirmarEntrega(c);
            acaoEl.appendChild(btn);
            if (tracking.cargaId !== c.id) iniciarRastreio(c.id);
          }
        });
      }

      function obterPosicao() {
        return new Promise((resolve, reject) => {
          if (!("geolocation" in navigator)) {
            reject(new Error("Este navegador não suporta GPS"));
            return;
          }
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 20000
          });
        });
      }

      async function iniciarViagem(carga) {
        try {
          const pos = await obterPosicao();
          await callFunction("minhas-cargas", {
            acao: "confirmar_carregamento",
            carga_id: carga.id,
            motorista_id: sessao.id,
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude
          });
          await carregarCargas();
        } catch (err) {
          alert("Não foi possível iniciar a viagem: " + err.message);
        }
      }

      function enviarPosicao(cargaId, latitude, longitude) {
        tracking.ultimoEnvio = Date.now();
        return callFunction("minhas-cargas", {
          acao: "atualizar_posicao",
          carga_id: cargaId,
          motorista_id: sessao.id,
          latitude,
          longitude
        }).catch(() => {});
      }

      // Se o app estiver rodando dentro do nosso app nativo Android (não
      // no navegador comum), ele expõe "AndroidTracking" - nesse caso o
      // rastreio roda de verdade em segundo plano (com o celular travado
      // ou em outro app), feito por um serviço nativo, não pelo navegador.
      function temRastreioNativo() {
        return typeof window.AndroidTracking !== "undefined";
      }

      function iniciarRastreio(cargaId) {
        pararRastreio();
        tracking.cargaId = cargaId;

        if (temRastreioNativo()) {
          window.AndroidTracking.iniciarRastreio(cargaId, sessao.id);
          return;
        }

        // Modo navegador (sem app nativo) - atualiza quando o GPS detecta
        // movimento (a maioria das vezes)
        tracking.watchId = navigator.geolocation.watchPosition(
          (pos) => {
            const agora = Date.now();
            if (agora - tracking.ultimoEnvio < 15000) return;
            enviarPosicao(cargaId, pos.coords.latitude, pos.coords.longitude);
          },
          () => {},
          { enableHighAccuracy: true, maximumAge: 10000, timeout: 20000 }
        );

        // "Heartbeat": mesmo se o motorista ficar parado (trânsito, parada,
        // celular sem detectar movimento), força uma atualização a cada
        // 5 minutos - assim a posição nunca fica travada no ponto de partida.
        // (No app nativo isso não é necessário - o serviço em segundo
        // plano já cuida disso de forma mais confiável.)
        tracking.heartbeatId = setInterval(() => {
          obterPosicao()
            .then((pos) => enviarPosicao(cargaId, pos.coords.latitude, pos.coords.longitude))
            .catch(() => {});
        }, INTERVALO_HEARTBEAT_MS);
      }

      function pararRastreio() {
        if (temRastreioNativo()) {
          window.AndroidTracking.pararRastreio();
        }
        if (tracking.watchId != null) {
          navigator.geolocation.clearWatch(tracking.watchId);
        }
        if (tracking.heartbeatId != null) {
          clearInterval(tracking.heartbeatId);
        }
        tracking.watchId = null;
        tracking.heartbeatId = null;
        tracking.cargaId = null;
      }

      async function confirmarEntrega(carga) {
        if (!confirm("Confirmar entrega desta carga?")) return;
        try {
          await callFunction("minhas-cargas", {
            acao: "confirmar_entrega",
            carga_id: carga.id,
            motorista_id: sessao.id
          });
          pararRastreio();
          await carregarCargas();
        } catch (err) {
          alert("Erro ao confirmar entrega: " + err.message);
        }
      }

      carregarCargas();
      setInterval(carregarCargas, 20000);
    }
  </script>
</body>
</html>
