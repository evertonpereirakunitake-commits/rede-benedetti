<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Painel do gerente - Rede Benedetti</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0f172a">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="top-bar">
    <div class="logo-row">
      <img src="icons/icon.svg" alt="">
      <div>
        <h1>Cargas a caminho</h1>
        <div class="sub" id="nome-gerente"></div>
      </div>
    </div>
    <button class="secondary tag-btn" onclick="logout()">Sair</button>
  </div>

  <div class="container">
    <button id="btn-notif" class="secondary" style="display:none">Ativar notificações</button>
    <div id="lista">
      <div class="empty-state">Carregando...</div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/app-common.js"></script>
  <script>
    const sessao = requireSession("gerente");

    if (sessao) {
      document.getElementById("nome-gerente").textContent = sessao.nome;

      if ("Notification" in window && Notification.permission === "default") {
        const btnNotif = document.getElementById("btn-notif");
        btnNotif.style.display = "block";
        btnNotif.onclick = () => {
          Notification.requestPermission().then(() => {
            btnNotif.style.display = "none";
          });
        };
      }

      const LIMITES_KM = [30, 20, 10, 5];
      const alarmesDisparados = {};
      let statusAnterior = {};
      let primeiraChecagem = true;

      async function carregarCargas() {
        const listaEl = document.getElementById("lista");
        try {
          const resp = await callFunction("minhas-cargas", {
            acao: "listar_gerente",
            posto_id: sessao.posto_id
          });
          const cargas = resp.cargas || [];
          renderizarLista(cargas, listaEl);
          checarNotificacoes(cargas);
          checarProximidade(cargas);
        } catch (err) {
          listaEl.innerHTML = `<div class="error-msg">${err.message}</div>`;
        }
      }

      function telefoneLimpo(tel) {
        return (tel || "").replace(/[^\d+]/g, "");
      }

      function renderizarLista(cargas, listaEl) {
        if (cargas.length === 0) {
          listaEl.innerHTML = '<div class="empty-state">Nenhuma carga a caminho no momento.</div>';
          return;
        }
        listaEl.innerHTML = cargas.map((c) => `
          <div class="card">
            <span class="badge ${statusClass(c.status)}">${statusLabel(c.status)}</span>
            <h3>${c.motorista_nome}</h3>
            <div class="row"><span>Combustível</span><span>${c.combustivel}</span></div>
            <div class="row"><span>Volume enviado</span><span>${c.volume_total} L</span></div>
            <div class="row"><span>Placa</span><span>${c.motorista_placa || "-"}</span></div>

            ${c.status === "em_transito" ? `
              <div class="km-display">
                ${c.distancia_restante_km != null
                  ? `<div class="km-num">${Number(c.distancia_restante_km).toFixed(1)}<span class="km-unit">km</span></div>
                     <div class="km-eta">chegada em ~${c.tempo_estimado_min ?? "-"} min</div>`
                  : `<div class="km-eta">Aguardando localização do motorista...</div>`}
              </div>
            ` : ""}

            ${c.status === "aguardando_conferencia" ? `
              <div class="confere-box" data-carga="${c.id}">
                <div class="confere-aviso">O motorista confirmou a entrega. Confira o volume recebido para fechar esta carga.</div>
                <label>Volume recebido (litros)</label>
                <input type="number" step="0.01" min="0" inputmode="decimal" class="input-recebido" placeholder="Ex: ${c.volume_total}">
                <button class="confirmar-recebimento">Confirmar recebimento</button>
                <div class="confere-msg"></div>
              </div>
            ` : ""}

            ${c.motorista_telefone ? `
              <a class="btn secondary" href="tel:${telefoneLimpo(c.motorista_telefone)}">Ligar para o motorista · ${c.motorista_telefone}</a>
            ` : ""}
          </div>
        `).join("");
      }

      function checarNotificacoes(cargas) {
        cargas.forEach((c) => {
          const anterior = statusAnterior[c.id];
          if (!primeiraChecagem) {
            if (anterior === undefined) {
              tocarAlerta();
              notificar("Carga aguardando envio", `${c.motorista_nome} vai trazer ${c.combustivel} - ${c.volume_total} L`);
            } else if (anterior === "aguardando_carregamento" && c.status === "em_transito") {
              tocarAlerta();
              notificar("Motorista confirmou o carregamento", `${c.motorista_nome} está a caminho com ${c.combustivel} - acompanhe o km e o tempo restante`);
            } else if (anterior !== "aguardando_conferencia" && c.status === "aguardando_conferencia") {
              tocarAlerta();
              notificar("Motorista chegou", `${c.motorista_nome} confirmou a entrega - confira o volume recebido`);
            }
          }
          statusAnterior[c.id] = c.status;
        });
        primeiraChecagem = false;
      }

      function checarProximidade(cargas) {
        cargas.forEach((c) => {
          if (c.status !== "em_transito" || c.distancia_restante_km == null) return;
          const dist = Number(c.distancia_restante_km);
          if (!alarmesDisparados[c.id]) alarmesDisparados[c.id] = new Set();
          const jaAvisados = alarmesDisparados[c.id];
          const cruzados = LIMITES_KM.filter((limite) => dist <= limite && !jaAvisados.has(limite));
          if (cruzados.length === 0) return;
          const menorLimite = Math.min(...cruzados);
          cruzados.forEach((limite) => jaAvisados.add(limite));
          tocarAlerta();
          notificar(`${c.motorista_nome} está a ${menorLimite} km`, `${c.combustivel} - chegando ao posto`);
        });
      }

      document.getElementById("lista").addEventListener("click", async (e) => {
        if (!e.target.classList.contains("confirmar-recebimento")) return;
        const box = e.target.closest(".confere-box");
        const cargaId = box.dataset.carga;
        const input = box.querySelector(".input-recebido");
        const msg = box.querySelector(".confere-msg");
        const volume = Number(input.value);

        if (!input.value || !(volume > 0)) {
          msg.textContent = "Informe o volume recebido (maior que zero).";
          msg.className = "confere-msg error-msg";
          return;
        }

        e.target.disabled = true;
        e.target.textContent = "Confirmando...";
        msg.textContent = "";
        msg.className = "confere-msg";

        try {
          await callFunction("minhas-cargas", {
            acao: "confirmar_recebimento",
            carga_id: cargaId,
            posto_id: sessao.posto_id,
            volume_recebido: volume
          });
          msg.textContent = "Recebimento confirmado!";
          msg.className = "confere-msg success-msg";
          setTimeout(carregarCargas, 900);
        } catch (err) {
          msg.textContent = err.message;
          msg.className = "confere-msg error-msg";
          e.target.disabled = false;
          e.target.textContent = "Confirmar recebimento";
        }
      });

      carregarCargas();
      setInterval(carregarCargas, 10000);
    }
  </script>
</body>
</html>
