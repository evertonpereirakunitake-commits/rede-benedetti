<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Cadastro de gerente - Rede Benedetti</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0f172a">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="top-bar">
    <div class="logo-row">
      <img src="icons/icon.svg" alt="">
      <h1>Cadastro de gerente</h1>
    </div>
  </div>

  <div class="container">
    <p class="sub" style="color:var(--text-dim)">Cadastro do gerente responsável pelo posto. Use o CNPJ do posto (não o seu telefone pessoal) — assim o acesso continua o mesmo mesmo se trocar de gerente.</p>

    <form id="form-gerente">
      <label for="ger-cnpj">CNPJ do posto</label>
      <input id="ger-cnpj" type="text" inputmode="numeric" placeholder="12345678000199" required>

      <label for="ger-nome">Seu nome</label>
      <input id="ger-nome" type="text" required>

      <label for="ger-telefone">Telefone de contato (opcional)</label>
      <input id="ger-telefone" type="tel" inputmode="numeric" placeholder="5514999991111">

      <label for="ger-pin">Crie um PIN de 4 dígitos pra entrar no app</label>
      <input id="ger-pin" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="••••" required>

      <button type="submit" id="btn-salvar">Criar acesso do posto</button>
      <div class="msg"></div>
    </form>

    <div id="sucesso" style="display:none; text-align:center; margin-top:20px">
      <p style="color:var(--text-dim)">Cadastro feito! Guarde o CNPJ do posto e o PIN — é com eles que você entra no app.</p>
      <a class="btn" href="login.html?tipo=gerente">Entrar agora</a>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/app-common.js"></script>
  <script>
    const form = document.getElementById("form-gerente");
    const msgEl = form.querySelector(".msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-salvar");
      msgEl.innerHTML = "";
      btn.disabled = true;
      btn.textContent = "Salvando...";

      try {
        await callFunction("cadastro", {
          tipo: "gerente",
          cnpj_posto: document.getElementById("ger-cnpj").value.trim().replace(/\D/g, ""),
          nome: document.getElementById("ger-nome").value.trim(),
          telefone: document.getElementById("ger-telefone").value.trim().replace(/\D/g, "") || null,
          pin: document.getElementById("ger-pin").value.trim()
        });
        form.style.display = "none";
        document.getElementById("sucesso").style.display = "block";
      } catch (err) {
        msgEl.innerHTML = `<div class="error-msg">${err.message}</div>`;
        btn.disabled = false;
        btn.textContent = "Criar acesso do posto";
      }
    });
  </script>
</body>
</html>
